<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track your daily spending with Expense & Budget Visualizer">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Apply saved theme before CSS renders to prevent flash -->
    <script>
        (function() {
            var saved = localStorage.getItem('expense_tracker_theme');
            var theme = saved === 'dark' || saved === 'light'
                ? saved
                : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-top">
                    <div>
                        <h1 class="header-title">💰 Budget Tracker</h1>
                        <p class="header-subtitle">Track your spending and manage your budget</p>
                    </div>
                    <button 
                        class="theme-toggle" 
                        id="themeToggle" 
                        aria-label="Toggle dark mode" 
                        title="Toggle dark mode"
                    >
                        <span class="theme-toggle__icon theme-toggle__icon--light" aria-hidden="true">☀️</span>
                        <span class="theme-toggle__icon theme-toggle__icon--dark" aria-hidden="true">🌙</span>
                        <span class="theme-toggle__label" id="themeLabel">Light Mode</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard Stats -->
            <section class="dashboard">
                <div class="stat-card stat-card--balance">
                    <span class="stat-label">Total Balance</span>
                    <h2 class="stat-value" id="totalBalance">$0.00</h2>
                </div>
                <div class="stat-card stat-card--income">
                    <span class="stat-label">Total Income</span>
                    <p class="stat-amount" id="totalIncome">$0.00</p>
                </div>
                <div class="stat-card stat-card--expense">
                    <span class="stat-label">Total Expense</span>
                    <p class="stat-amount" id="totalExpense">$0.00</p>
                </div>
            </section>

            <!-- Add Transaction Form -->
            <section class="form-section">
                <h2 class="section-title">Add Transaction</h2>
                <form class="transaction-form" id="transactionForm">
                    <div class="form-group">
                        <label for="description" class="form-label">Description</label>
                        <input 
                            type="text" 
                            id="description" 
                            class="form-input" 
                            placeholder="e.g., Groceries, Rent, Salary"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="amount" class="form-label">Amount</label>
                        <input 
                            type="number" 
                            id="amount" 
                            class="form-input" 
                            placeholder="0.00"
                            step="0.01"
                            min="0"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="category" class="form-label">Category</label>
                        <select id="category" class="form-select" required>
                            <option value="">Select a category</option>
                            <option value="Food">Food & Dining</option>
                            <option value="Transport">Transport</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Health">Health & Fitness</option>
                            <option value="Education">Education</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="type" class="form-label">Type</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="type" value="expense" checked>
                                <span>Expense</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="type" value="income">
                                <span>Income</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn--primary">Add Transaction</button>
                </form>
            </section>

            <!-- Chart Section -->
            <section class="chart-section">
                <h2 class="section-title">Spending by Category</h2>
                <div class="chart-container">
                    <canvas id="spendingChart"></canvas>
                </div>
            </section>

            <!-- Transactions History -->
            <section class="transactions-section">
                <div class="transactions-header">
                    <h2 class="section-title">
                        Transaction History
                        <span class="transaction-count" id="transactionCount"></span>
                    </h2>
                    <div class="transactions-actions">
                        <button class="btn btn--small btn--secondary" id="exportBtn" title="Export to CSV">
                            ↓ Export CSV
                        </button>
                        <button class="btn btn--small btn--secondary" id="clearBtn">Clear All</button>
                    </div>
                </div>

                <!-- Search & Filter Bar -->
                <div class="filter-bar">
                    <div class="filter-search">
                        <span class="filter-search__icon" aria-hidden="true">🔍</span>
                        <input
                            type="text"
                            id="searchInput"
                            class="form-input filter-search__input"
                            placeholder="Search transactions…"
                            aria-label="Search transactions"
                        >
                    </div>
                    <select id="filterCategory" class="form-select filter-select" aria-label="Filter by category">
                        <option value="">All Categories</option>
                        <option value="Food">Food & Dining</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Health">Health & Fitness</option>
                        <option value="Education">Education</option>
                        <option value="Other">Other</option>
                    </select>
                    <select id="filterType" class="form-select filter-select" aria-label="Filter by type">
                        <option value="">All Types</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                    <button class="btn btn--small btn--secondary" id="clearFilterBtn" title="Clear filters">✕ Clear</button>
                </div>

                <div class="transactions-list" id="transactionsList">
                    <p class="empty-state">No transactions yet. Add one to get started!</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2024 Expense & Budget Visualizer. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>

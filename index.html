<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track your daily spending with Expense & Budget Visualizer">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="header-title">💰 Budget Tracker</h1>
                <p class="header-subtitle">Track your spending and manage your budget</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard Stats -->
            <section class="dashboard">
                <div class="stat-card stat-card--balance">
                    <span class="stat-label">Total Balance</span>
                    <h2 class="stat-value" id="totalBalance">$0.00</h2>
                </div>
                <div class="stat-card stat-card--income">
                    <span class="stat-label">Total Income</span>
                    <p class="stat-amount" id="totalIncome">$0.00</p>
                </div>
                <div class="stat-card stat-card--expense">
                    <span class="stat-label">Total Expense</span>
                    <p class="stat-amount" id="totalExpense">$0.00</p>
                </div>
            </section>

            <!-- Add Transaction Form -->
            <section class="form-section">
                <h2 class="section-title">Add Transaction</h2>
                <form class="transaction-form" id="transactionForm">
                    <div class="form-group">
                        <label for="description" class="form-label">Description</label>
                        <input 
                            type="text" 
                            id="description" 
                            class="form-input" 
                            placeholder="e.g., Groceries, Rent, Salary"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="amount" class="form-label">Amount</label>
                        <input 
                            type="number" 
                            id="amount" 
                            class="form-input" 
                            placeholder="0.00"
                            step="0.01"
                            min="0"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="category" class="form-label">Category</label>
                        <select id="category" class="form-select" required>
                            <option value="">Select a category</option>
                            <option value="Food">Food & Dining</option>
                            <option value="Transport">Transport</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Health">Health & Fitness</option>
                            <option value="Education">Education</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="type" class="form-label">Type</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="type" value="expense" checked>
                                <span>Expense</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="type" value="income">
                                <span>Income</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn--primary">Add Transaction</button>
                </form>
            </section>

            <!-- Chart Section -->
            <section class="chart-section">
                <h2 class="section-title">Spending by Category</h2>
                <div class="chart-container">
                    <canvas id="spendingChart"></canvas>
                </div>
            </section>

            <!-- Transactions History -->
            <section class="transactions-section">
                <div class="transactions-header">
                    <h2 class="section-title">Transaction History</h2>
                    <button class="btn btn--small btn--secondary" id="clearBtn">Clear All</button>
                </div>
                <div class="transactions-list" id="transactionsList">
                    <p class="empty-state">No transactions yet. Add one to get started!</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2024 Expense & Budget Visualizer. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
